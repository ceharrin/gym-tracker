name: GymTracker
options:
  bundleIdPrefix: com.chrisharrington
  deploymentTarget:
    iOS: "18.0"

targets:
  GymTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: GymTrackerTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/GymTracker.app/GymTracker
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: GymTracker
        embed: false

  GymTracker:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: GymTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrisharrington.GymTracker
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: GymTracker/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: GymTracker/GymTracker.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
